<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Infrastructure Explorer</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Map controls">
        <header class="app-header">
          <div>
            <h1>Infrastructure Explorer</h1>
            <p id="datasetSummary">Loading manifest...</p>
          </div>
          <button id="fitLoadedBtn" class="icon-btn" type="button" title="Fit loaded layers" aria-label="Fit loaded layers">
            <span aria-hidden="true">&#8982;</span>
          </button>
        </header>

        <section id="layersPanel" class="panel">
          <div class="panel-title">
            <button id="layersPanelToggle" class="panel-collapse-btn" type="button" aria-expanded="true" aria-controls="layersPanelBody" aria-label="Collapse Layers">
              <span aria-hidden="true"></span>
              <h2>Layers</h2>
            </button>
            <button id="clearLayersBtn" class="text-btn" type="button">Clear all</button>
          </div>
          <div id="layersPanelBody">
            <div id="layersList" class="layers-list"></div>
          </div>
        </section>

        <section id="countriesPanel" class="panel">
          <div class="panel-title">
            <button id="countriesPanelToggle" class="panel-collapse-btn" type="button" aria-expanded="true" aria-controls="countriesPanelBody" aria-label="Collapse Countries">
              <span aria-hidden="true"></span>
              <h2>Countries</h2>
            </button>
            <div class="panel-actions">
              <span id="countriesCount" class="muted">0 countries</span>
              <button id="clearCountriesBtn" class="text-btn" type="button">Clear all</button>
            </div>
          </div>
          <div id="countriesPanelBody">
            <div id="countriesList" class="countries-list"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>Search Loaded</h2>
            <span id="loadedCount" class="muted">0 loaded</span>
          </div>
          <input id="searchInput" class="search-input" type="search" placeholder="Name, INN, type, region..." />
          <div id="searchResults" class="search-results"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>Radius</h2>
            <button id="radiusModeBtn" class="text-btn" type="button">Draw Radius</button>
          </div>
          <div id="radiusPanel" class="radius-panel" hidden>
            <div class="panel-title">
              <h2>Radius Results</h2>
              <span id="radiusSummary" class="muted">0 objects</span>
            </div>
            <div class="actions-row">
              <button id="exportRadiusBtn" class="text-btn" type="button">Export CSV</button>
              <button id="resetRadiusBtn" class="text-btn" type="button">Reset radius</button>
            </div>
            <div id="radiusResults" class="result-list"></div>
          </div>
        </section>
      </aside>

      <section class="map-wrap" aria-label="Interactive infrastructure map">
        <div id="map"></div>
        <div id="loadingToast" class="loading-toast" hidden>Loading layer...</div>
      </section>

      <aside class="estimator-sidebar" aria-label="Scenario estimator">
        <section id="estimatorPanel" class="panel estimator-panel">
          <div class="panel-title">
            <h2>Scenario Estimator</h2>
            <span id="estimatorSummary" class="muted">Draw a radius</span>
          </div>
          <div class="estimator-actions">
            <button id="exportAssumptionsBtn" class="text-btn" type="button">Export settings</button>
            <button id="importAssumptionsBtn" class="text-btn" type="button">Import settings</button>
            <button id="exportEstimateBtn" class="text-btn" type="button">Export estimate</button>
            <button id="resetEstimatorBtn" class="text-btn" type="button">Clear all</button>
            <input id="importAssumptionsInput" type="file" accept="application/json,.json" hidden />
          </div>

          <section id="rangeBandsBlock" class="estimator-block">
            <div class="estimator-block-title">
              <button id="rangeBandsToggle" class="panel-collapse-btn estimator-collapse-btn" type="button" aria-expanded="true" aria-controls="rangeBandsBody" aria-label="Collapse Range bands">
                <span aria-hidden="true"></span>
                <h3>Range bands</h3>
              </button>
              <button id="addRangeBandBtn" class="text-btn" type="button">Add</button>
            </div>
            <div id="rangeBandsBody">
              <div id="rangeBandsList" class="estimator-list"></div>
            </div>
          </section>

          <section id="resourceTypesBlock" class="estimator-block">
            <div class="estimator-block-title">
              <button id="resourceTypesToggle" class="panel-collapse-btn estimator-collapse-btn" type="button" aria-expanded="true" aria-controls="resourceTypesBody" aria-label="Collapse Resource types">
                <span aria-hidden="true"></span>
                <h3>Resource types</h3>
              </button>
            </div>
            <div id="resourceTypesBody">
              <div id="resourceTypesList" class="estimator-list"></div>
            </div>
          </section>

          <section id="categoryAssumptionsBlock" class="estimator-block">
            <div class="estimator-block-title">
              <button id="categoryAssumptionsToggle" class="panel-collapse-btn estimator-collapse-btn" type="button" aria-expanded="true" aria-controls="categoryAssumptionsBody" aria-label="Collapse Category assumptions">
                <span aria-hidden="true"></span>
                <h3>Category assumptions</h3>
              </button>
            </div>
            <div id="categoryAssumptionsBody">
              <div id="categoryAssumptionsList" class="estimator-list"></div>
            </div>
          </section>

          <section class="estimator-block">
            <div class="estimator-block-title">
              <h3>Estimate</h3>
              <span id="estimatorRadiusLabel" class="muted">Active layers only</span>
            </div>
            <div id="estimatorResults" class="estimator-results"></div>
          </section>
        </section>
      </aside>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="app.js"></script>
  </body>
</html>
